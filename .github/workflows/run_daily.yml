name: Date Check
on:
  schedule:
    - cron: '55 8 * * 1-5'
  workflow_dispatch:

env:
  creds: ${{ secrets.creds }}
  spreadsheet_id: ${{ secrets.spreadsheet_id }}
  oauth_token: ${{ secrets.oauth_token }}
  chat_id: ${{ secrets.chat_id }}
  host: ${{ secrets.host }}
  ch_username: ${{ secrets.ch_username }}
  password: ${{ secrets.password }}
  range_names: ${{ secrets.range_names }}
  ca_cert: RootCA.pem


jobs:
    Date-Check:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'
                  cache: 'pip'
            - name: Install Dependencies
              run: pip install -r requirements.txt
            - name: Get Certificate
              run: wget "https://storage.yandexcloud.net/cloud-certs/RootCA.pem" -O RootCA.pem
            - name: Run Date Check
              run: python -u date_check.py
            - name: Send Failure Notification
              if: failure()
              run: |
                curl -X POST https://botapi.messenger.yandex.net/bot/v1/messages/sendText/ \
                -H "Authorization: OAuth ${{ env.oauth_token }}" \
                -H "Content-Type: application/json" \
                -d "{\"chat_id\": \"${{ env.chat_id }}\", \"text\": \"🚨 GitHub Action: ClickHouse Date Check failed! Please check the logs.\"}"
